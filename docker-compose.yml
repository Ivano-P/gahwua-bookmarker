services:
  db:
    image: postgres:16-alpine
    container_name: gahwua-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: gahwua_dev
    volumes:
      - gahwua_pgdata:/var/lib/postgresql/data

volumes:
  gahwua_pgdata: